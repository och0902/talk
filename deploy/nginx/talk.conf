##################################################
#
#  talk.ystory52.com, backend port:4510 
#
#################################################

server {
   listen 80;
   listen [::]:80;
   server_name talk.ystory52.com www.talk.ystory52.com;

   return 301 https://$host$request_uri;
}

server {
   listen 443 ssl;
   listen [::]:443 ssl;
   http2 on;
   server_name talk.ystory52.com www.talk.ystory52.com;

   ssl_certificate /etc/letsencrypt/live/talk.ystory52.com/fullchain.pem;
   ssl_certificate_key /etc/letsencrypt/live/talk.ystory52.com/privkey.pem;

   ssl_protocols TLSv1.2 TLSv1.3;
   ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
   ssl_prefer_server_ciphers off;
   ssl_session_cache shared:SSL:10m;
   ssl_session_timeout 1h;
   resolver 8.8.8.8 8.8.4.4 valid=300s;
   resolver_timeout 5s;

   # 보안 헤더
   add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload" always;
   add_header X-Content-Type-Options nosniff;
   add_header X-XSS-Protection "1; mode=block";
   add_header X-Frame-Options DENY;
   add_header Referrer-Policy "no-referrer-when-downgrade";

   # 압축 설정
   gzip on;
   gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

   root /var/www/talk/frontend_vite/dist;
   index index.html;

   client_max_body_size 10m;
   
   location / {
      proxy_http_version 1.1;
      
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      proxy_cache_bypass $http_upgrade;
      
      try_files $uri $uri/ /index.html;
   }

   location /api/ {
    proxy_pass http://127.0.0.1:4510;
    proxy_http_version 1.1;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
   }

   location /socket.io/ {
    proxy_pass http://127.0.0.1:4510;
    proxy_http_version 1.1;
    
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
   }
   
   error_log /var/log/nginx/talk_error.log warn;
   access_log /var/log/nginx/talk_access.log combined;
}